services:
  - type: web
    name: dimaru-api
    env: node
    plan: free
    # Note: add `&& npm run db:deploy` after `npm run build` once Prisma migrations are committed
    buildCommand: corepack enable && NODE_ENV=development npm install && npm run build
    startCommand: npm run start --workspace=@dmb/api
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: dimaru-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: dimaru-redis
          property: connectionString
      - key: DASHBOARD_URL
        value: https://dimaru-dashboard.onrender.com
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: GOD_MODE_USER_IDS
        sync: false
      - key: ECONOMY_HMAC_SECRET
        sync: false

  - type: web
    name: dimaru-dashboard
    env: node
    plan: free
    buildCommand: corepack enable && NEXT_IGNORE_INCORRECT_LOCKFILE=true NODE_ENV=development npm install && npm run build
    startCommand: npm run start --workspace=@dmb/dashboard
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://dimaru-api.onrender.com/api
      - key: DISCORD_CLIENT_ID
        sync: false

  - type: worker
    name: dimaru-bot
    env: node
    plan: free
    buildCommand: corepack enable && NODE_ENV=development npm install && npm run build
    startCommand: npm run start --workspace=@dmb/bot
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: dimaru-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: dimaru-redis
          property: connectionString
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: GOD_MODE_USER_IDS
        sync: false

  - type: keyvalue
    name: dimaru-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

databases:
  - name: dimaru-postgres
    databaseName: dimarubot
    user: dimaru
    plan: free
